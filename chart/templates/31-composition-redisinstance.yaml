{{- /*
RedisInstance -> Azure Managed Redis, reachable only through a private endpoint.

## Why Managed Redis and not Azure Cache for Redis

Azure Cache for Redis (Microsoft.Cache/redis) is retired. It does not fail slowly or degrade —
the control plane rejects creation outright:

  create failed: async create failed: ... performing RedisCreate: unexpected status 400
  (400 Bad Request) with error: BadRequest: Azure Cache for Redis is retiring, create Azure
  Managed Redis instance instead. Learn more: https://aka.ms/AzureCacheForRedisRetirement

No chart change to the old kind can fix that, so this Composition targets Azure Managed Redis
(Microsoft.Cache/redisEnterprise) via the provider's ManagedRedis kind. ADR-0019 records the
decision. The two products differ in every dimension this file touches — kind, SKU grammar,
private-link subresource, DNS zone, and port — so none of the old values carried over.

## Privacy

Managed Redis cannot be VNet-injected at all (unlike Flexible Server, and unlike the Premium
tier of the old service), so a private endpoint is the ONLY private path. Privacy is built from
two resources: the instance with public access off, plus a PrivateEndpoint in the
private-endpoints subnet whose zone group registers it in privatelink.redis.azure.net.

That zone name is load-bearing and is NOT the old privatelink.redis.cache.windows.net:

  Azure Managed Redis  (Microsoft.Cache/redisEnterprise)  redisEnterprise  privatelink.redis.azure.net
  Azure Cache for Redis (Microsoft.Cache/redis, retired)  redisCache       privatelink.redis.cache.windows.net

Both the subresource name and the zone must match the service. A zone group pointed at the
wrong zone still applies cleanly and still resolves to nothing, so this is a silent failure
mode, not a loud one. plat-eng-aks-foundation owns the zone and exports its id.

All fields below are VERIFIED against the live CRDs on aks-test (2026-07-16):
  - ManagedRedis     cache.azure.m.upbound.io/v1beta1
  - PrivateEndpoint  network.azure.m.upbound.io/v1beta1

## How the app gets its credentials

Crossplane v2 removed composite-resource connection details, so the connection Secret is
composed here rather than projected (see the same note in the Postgres Composition). Two
secrets land in the XR's namespace:

  <name>-redis-conn  host, port  (composed below; engine in the name so it cannot collide
                     with a same-named PostgresInstance's secret)
  <name>-auth   the instance's own connection details, written by the provider: the access key
                is sensitive, so upjet publishes it and this chart never handles it.
*/ -}}
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: redisinstance-azure-private
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    engine: azure-managed-redis
spec:
  compositeTypeRef:
    apiVersion: {{ .Values.xrds.group }}/{{ .Values.xrds.version }}
    kind: RedisInstance
  mode: Pipeline
  pipeline:
  - step: environment-configs
    functionRef:
      name: function-environment-configs
    input:
      apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
      kind: Input
      spec:
        environmentConfigs:
        - type: Reference
          ref:
            name: {{ .Values.environmentConfig.name }}
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: managedredis
        base:
          apiVersion: cache.azure.m.upbound.io/v1beta1
          kind: ManagedRedis
          spec:
            providerConfigRef:
              kind: ClusterProviderConfig
              name: {{ .Values.providerConfig.name }}
            forProvider:
              # Private-only. The XR has no field that can flip this. Note the grammar differs
              # from the old kind: a string Enabled/Disabled, not a publicNetworkAccessEnabled
              # boolean.
              publicNetworkAccess: Disabled
              highAvailabilityEnabled: {{ .Values.redis.highAvailabilityEnabled }}
              # "A Managed Redis instance will not be functional without a database" — the block
              # is optional in the schema but not in practice, so it is always set here.
              defaultDatabase:
                # TLS only. The plaintext alternative is never offered.
                clientProtocol: Encrypted
                clusteringPolicy: {{ .Values.redis.clusteringPolicy }}
                evictionPolicy: {{ .Values.redis.evictionPolicy }}
                # Azure defaults this to FALSE (Managed Redis prefers Entra ID auth). Left at
                # the default there would be no access key at all, and the <name>-auth secret
                # this platform promises its consumers would come up empty. Set explicitly so
                # the contract holds. ADR-0019 records Entra ID as the follow-up.
                accessKeysAuthenticationEnabled: true
        patches:
        # Location and resource group are environment facts. The private endpoint below must
        # land in the VNet's region, so a hardcoded region breaks the private path entirely.
        - type: FromEnvironmentFieldPath
          fromFieldPath: location
          toFieldPath: spec.forProvider.location
        - type: FromEnvironmentFieldPath
          fromFieldPath: resourceGroupName
          toFieldPath: spec.forProvider.resourceGroupName
        # Managed Redis folds tier and capacity into ONE sku name (Balanced_B0), where the old
        # service took family + skuName + capacity as three fields. The size ladder lives in
        # values.yaml so the platform can retune it without touching this pipeline.
        - type: FromCompositeFieldPath
          fromFieldPath: spec.size
          toFieldPath: spec.forProvider.skuName
          transforms:
          - type: map
            map:
{{ toYaml .Values.redis.sizes | indent 14 }}
        # The access key is sensitive, so the provider publishes it to this secret. Named
        # after the XR; namespace-local, like every namespaced MR's secret ref.
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: spec.writeConnectionSecretToRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: "%s-auth"
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.hostname
          toFieldPath: status.hostname
        # The port lives on the database, not the instance. Managed Redis serves TLS on 10000,
        # not the old service's 6380 — which is why the XR reports whatever Azure says rather
        # than a constant baked into this chart.
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.defaultDatabase.port
          toFieldPath: status.port
        # Hop 1 of 2: surface the instance's Azure id on the XR so the PrivateEndpoint below can
        # read it. patch-and-transform cannot patch directly between composed resources.
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.id
          toFieldPath: status.cacheId

      - name: privateendpoint
        base:
          apiVersion: network.azure.m.upbound.io/v1beta1
          kind: PrivateEndpoint
          spec:
            providerConfigRef:
              kind: ClusterProviderConfig
              name: {{ .Values.providerConfig.name }}
            forProvider:
              # Both are single objects, NOT lists — verified against the live CRD. The
              # terraform resource takes repeatable blocks, so the list form looks right and
              # is what upjet generates for some resources; here it is rejected outright:
              #   unknown field "spec.forProvider.privateServiceConnection[0].name"
              privateServiceConnection:
                name: redis
                isManualConnection: false
                # Managed Redis is redisEnterprise. The old service's redisCache subresource
                # does not exist on this resource type and the link would never approve.
                subresourceNames:
                - redisEnterprise
              privateDnsZoneGroup:
                name: redis
        patches:
        - type: FromEnvironmentFieldPath
          fromFieldPath: location
          toFieldPath: spec.forProvider.location
        - type: FromEnvironmentFieldPath
          fromFieldPath: resourceGroupName
          toFieldPath: spec.forProvider.resourceGroupName
        - type: FromEnvironmentFieldPath
          fromFieldPath: peSubnetId
          toFieldPath: spec.forProvider.subnetId
        # privatelink.redis.azure.net, exported by the foundation. See the header.
        - type: FromEnvironmentFieldPath
          fromFieldPath: redisZoneId
          toFieldPath: spec.forProvider.privateDnsZoneGroup.privateDnsZoneIds[0]
        # Hop 2 of 2: bind the endpoint to the instance created above. Required, so the endpoint
        # is skipped until the instance's id exists — it renders on the second reconcile.
        - type: FromCompositeFieldPath
          fromFieldPath: status.cacheId
          toFieldPath: spec.forProvider.privateServiceConnection.privateConnectionResourceId
          policy:
            fromFieldPath: Required
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: spec.forProvider.privateServiceConnection.name

      # The connection contract. Composed rather than projected, because v2 has no XR
      # connection details. Required on status.hostname, so it never appears with an empty host.
      - name: connection-secret
        base:
          apiVersion: v1
          kind: Secret
          type: Opaque
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: "%s-redis-conn"
        - type: FromCompositeFieldPath
          fromFieldPath: status.hostname
          toFieldPath: stringData.host
          policy:
            fromFieldPath: Required
        - type: FromCompositeFieldPath
          fromFieldPath: status.port
          toFieldPath: stringData.port
          policy:
            fromFieldPath: Required
          transforms:
          - type: convert
            convert:
              toType: string
        # A Secret has no status.conditions, and patch-and-transform's default readiness check
        # waits for Ready=True — so without this the composed Secret is never ready and the XR
        # never goes Ready, no matter how healthy the Azure resources are. `None` means ready
        # as soon as it exists, which for a Secret is the only meaningful definition.
        readinessChecks:
        - type: None
