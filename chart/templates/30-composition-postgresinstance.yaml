{{- /*
PostgresInstance -> Azure Database for PostgreSQL Flexible Server, private-only.

apiVersions are pinned to what the v2.5.2 providers actually serve, verified against the live
CRDs on aks-test (2026-07-16). Note they are v1beta1, NOT the v1beta2 that the legacy
cluster-scoped groups serve and that ADR-0010 quotes: adding `.m.` resets the version.
  kubectl explain flexibleserver --api-version=dbforpostgresql.azure.m.upbound.io/v1beta1

Privacy comes from three fields together, none of which the XR can override:
  delegatedSubnetId          -> VNet-inject the server into the delegated subnet
  privateDnsZoneId           -> register its name in the private zone
  publicNetworkAccessEnabled -> false

## How the app gets its credentials

Crossplane v2 REMOVED composite-resource connection details: an XR has no
writeConnectionSecretToRef, and a Composition's `connectionDetails:` blocks are collected and
silently dropped. ADR-0010's projection requirement is unchanged — a pod still cannot read a
CR's status — but the mechanism it named no longer exists, so the connection Secret is
*composed* here instead (the v2-sanctioned replacement). Two secrets land in the XR's namespace:

  <name>-postgres-conn   host, port, username, dbname   (composed below)
  <name>-admin-password  password                       (generated by the provider)

The name carries the engine because a PostgresInstance and a RedisInstance may share a name in
one namespace; a bare `-conn` would collide and leave two controllers fighting over one Secret.

The password is never minted or held by this control plane: `autoGeneratePassword: true` makes
the provider generate it and write it to the secret named by administratorPasswordSecretRef.

Two caveats on that secret, both inherent to it being provider-owned rather than composed:
it has no ownerReference to the XR, so deleting the XR leaves the credential behind; and
autoGeneratePassword only generates when the secret has no password yet, so recreating an XR
with the same name silently reuses the old one. Delete it with the XR if that matters.
*/ -}}
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: postgresinstance-azure-flexibleserver
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    engine: azure-flexibleserver
spec:
  compositeTypeRef:
    apiVersion: {{ .Values.xrds.group }}/{{ .Values.xrds.version }}
    kind: PostgresInstance
  mode: Pipeline
  pipeline:
  - step: environment-configs
    functionRef:
      name: function-environment-configs
    input:
      apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
      kind: Input
      spec:
        environmentConfigs:
        - type: Reference
          ref:
            name: {{ .Values.environmentConfig.name }}
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: flexibleserver
        base:
          apiVersion: dbforpostgresql.azure.m.upbound.io/v1beta1
          kind: FlexibleServer
          spec:
            providerConfigRef:
              kind: ClusterProviderConfig
              name: {{ .Values.providerConfig.name }}
            forProvider:
              administratorLogin: {{ .Values.postgres.administratorLogin }}
              version: {{ .Values.postgres.version | quote }}
              storageMb: {{ .Values.postgres.storageMb }}
              skuName: {{ .Values.postgres.skuName }}
              # The provider generates the password and writes it to the secret below, so no
              # credential is ever minted here or committed to git.
              autoGeneratePassword: true
              administratorPasswordSecretRef:
                # Namespace-local: namespaced MRs resolve secrets in their own namespace, and
                # this ref has no `namespace` field at all.
                key: password
              # Private-only. The XR has no field that can flip this.
              publicNetworkAccessEnabled: false
        patches:
        # Network facts come from the EnvironmentConfig, never from the app. Location included:
        # a FlexibleServer must sit in the same region as the VNet it is injected into, and
        # Azure rejects the mismatch outright.
        - type: FromEnvironmentFieldPath
          fromFieldPath: location
          toFieldPath: spec.forProvider.location
        - type: FromEnvironmentFieldPath
          fromFieldPath: resourceGroupName
          toFieldPath: spec.forProvider.resourceGroupName
        - type: FromEnvironmentFieldPath
          fromFieldPath: postgresSubnetId
          toFieldPath: spec.forProvider.delegatedSubnetId
        - type: FromEnvironmentFieldPath
          fromFieldPath: postgresZoneId
          toFieldPath: spec.forProvider.privateDnsZoneId
        - type: FromCompositeFieldPath
          fromFieldPath: spec.version
          toFieldPath: spec.forProvider.version
        - type: FromCompositeFieldPath
          fromFieldPath: spec.storageMb
          toFieldPath: spec.forProvider.storageMb
        - type: FromCompositeFieldPath
          fromFieldPath: spec.size
          toFieldPath: spec.forProvider.skuName
          transforms:
          - type: map
            map:
              small: GP_Standard_D2s_v3
              medium: GP_Standard_D4s_v3
              large: GP_Standard_D8s_v3
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: spec.forProvider.administratorPasswordSecretRef.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: "%s-admin-password"
        # Surface the private FQDN and resource id on the XR's status. status.fqdn is what the
        # composed Secret below reads — the ADR-0010 projection, rebuilt for v2.
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.fqdn
          toFieldPath: status.fqdn
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.id
          toFieldPath: status.serverId

      - name: flexibleserverdatabase
        base:
          apiVersion: dbforpostgresql.azure.m.upbound.io/v1beta1
          kind: FlexibleServerDatabase
          spec:
            providerConfigRef:
              kind: ClusterProviderConfig
              name: {{ .Values.providerConfig.name }}
            forProvider:
              charset: UTF8
              collation: en_US.utf8
              serverIdSelector:
                matchControllerRef: true
        patches:
        # The database name is the external name, not a forProvider field — this resource has
        # no `spec.forProvider.name`. Patch the annotation or Azure silently gets the generated
        # MR name (e.g. orders-db-b2653d6f5cb6) instead of what the app asked for.
        - type: FromCompositeFieldPath
          fromFieldPath: spec.databaseName
          toFieldPath: metadata.annotations[crossplane.io/external-name]

      # The connection contract. Composed rather than projected, because v2 has no XR
      # connection details. Required on status.fqdn, so it appears only once the server exists
      # and its private FQDN is known — never with an empty host.
      - name: connection-secret
        base:
          apiVersion: v1
          kind: Secret
          type: Opaque
          stringData:
            port: "5432"
            username: {{ .Values.postgres.administratorLogin }}
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: metadata.name
          transforms:
          - type: string
            string:
              type: Format
              fmt: "%s-postgres-conn"
        - type: FromCompositeFieldPath
          fromFieldPath: status.fqdn
          toFieldPath: stringData.host
          policy:
            fromFieldPath: Required
        - type: FromCompositeFieldPath
          fromFieldPath: spec.databaseName
          toFieldPath: stringData.dbname
