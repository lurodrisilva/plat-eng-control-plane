# Same XR as redisinstance.yaml, but with the status a real cache would report.
#
# This is the one that renders the PrivateEndpoint: it is gated `Required` on status.cacheId,
# so it never appears on a first-pass render. Without this file the PE base is never checked
# against a CRD — which is how it shipped with `privateServiceConnection` as a list when the
# CRD wants an object.
#
# Values are representative, not real; nothing here is applied.
apiVersion: platform.myorg.io/v1alpha1
kind: RedisInstance
metadata:
  name: orders-cache
  namespace: team-orders
spec:
  size: small
  version: "6"
status:
  hostname: orders-cache-example.privatelink.redis.cache.windows.net
  sslPort: 6380
  cacheId: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/aks-test-rg/providers/Microsoft.Cache/redis/orders-cache-example
